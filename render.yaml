services:
  - type: web
    name: aimhere-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeployTrigger: off
    envVars:
      - key: SUPABASE_DB_URL
        sync: false
      - key: AUTH_SECRET_KEY
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-20250514
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
  - type: web
    name: aimhere-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeployTrigger: off
    routes:
      - type: rewrite
        source: "/*"
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: VITE_API_URL
        value: https://aimhere-api.onrender.com
      - key: VITE_GOOGLE_MAPS_API_KEY
        sync: false
